<!DOCTYPE HTML>
<html>
<head>
    <meta charset='utf-8'>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #ruffle { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <script src="https://ubghyper.github.io/GameList.github.io/ruffle/ruffle.js"></script>
    <div id='ruffle'></div>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", start_Ruffle, false);
        function start_Ruffle() {
            let ruffle = window.RufflePlayer.newest();
            let player = ruffle.createPlayer();
            let container = document.getElementById("ruffle");
            container.appendChild(player);
            player.load("https://ubghyper.github.io/GameList.github.io/Wheely/Wheely.swf");
            player.style.width = '100%';
            player.style.height = '100%';
        }
    </script>
</body>
</html>
