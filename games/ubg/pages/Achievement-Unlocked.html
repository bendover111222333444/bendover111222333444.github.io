<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d0d; }

#ruffle { position: absolute; inset: 0; }

#load {
  position: fixed;
  inset: 0;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d0d0d;
  transition: opacity 0.45s ease;
}
#load.out { opacity: 0; pointer-events: none; }

.lc {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
}

/* Spinner ring */
.rs { width: 52px; height: 52px; }
.rt { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 3; }
.ra {
  fill: none;
  stroke: #f07220;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 52 90;
  transform-origin: 26px 26px;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Sliding bar */
.bw { width: 140px; height: 2px; background: rgba(255,255,255,0.09); border-radius: 1px; overflow: hidden; }
.bf {
  height: 100%;
  width: 50%;
  background: #f07220;
  border-radius: 1px;
  animation: slide 1.6s ease-in-out infinite;
}
@keyframes slide {
  0%   { transform: translateX(-200%); }
  100% { transform: translateX(400%); }
}
</style>
</head>
<body>
<div id="load">
<div class="lc">
<svg aria-hidden="true" class="rs" viewbox="0 0 52 52">
<circle class="rt" cx="26" cy="26" r="21"></circle>
<circle class="ra" cx="26" cy="26" r="21"></circle>
</svg>
<div class="bw"><div class="bf"></div></div>
</div>
</div>
<div id="ruffle"></div>
<script>
window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = { splashScreen: false };
</script>
<script src="https://cdn.jsdelivr.net/gh/ubghyper/GameList.github.io@main/ruffle/ruffle.js"></script>
<script>
function dismiss() {
  var el = document.getElementById('load');
  if (!el) return;
  el.classList.add('out');
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
}

window.addEventListener('DOMContentLoaded', function() {
  var ruffle = window.RufflePlayer.newest();
  var player = ruffle.createPlayer();
  var container = document.getElementById('ruffle');
  container.appendChild(player);
  player.style.width = '100%';
  player.style.height = '100%';
  player.load('https://cdn.jsdelivr.net/gh/ubghyper/GameList.github.io@main/Achievement-Unlocked/achievementunlocked.swf');

  // Dismiss when SWF starts playing; fallback after 15s
  player.addEventListener('playing', dismiss);
  player.addEventListener('loadeddata', dismiss);
  setTimeout(dismiss, 15000);
});
</script>
</body>
</html>
