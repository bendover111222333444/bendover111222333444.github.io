<!DOCTYPE HTML>

<html>
<head>
<div data-src="https://cdn.jsdelivr.net/gh/ubghyper/GameList.github.io@main/Effing-Worms/index.html" id="intercept"></div>
<script defer="" src="https://cdn.jsdelivr.net/gh/bendover111222333444/bendover111222333444.github.io@main/js/games/interceptor.js"></script>
<meta charset="utf-8"/>
<title>Effing Worms</title>
<style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #ruffle { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/gh/ubghyper/GameList.github.io@main/ruffle/ruffle.js"></script>
<div id="ruffle"></div>
<script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", start_Ruffle, false);
        function start_Ruffle() {
            let ruffle = window.RufflePlayer.newest();
            let player = ruffle.createPlayer();
            let container = document.getElementById("ruffle");
            container.appendChild(player);
            player.load("https://cdn.jsdelivr.net/gh/ubghyper/GameList.github.io@main/Effing-Worms/effingworms.swf");
            player.style.width = '100%';
            player.style.height = '100%';
        }
    </script>
</body>
</html>
