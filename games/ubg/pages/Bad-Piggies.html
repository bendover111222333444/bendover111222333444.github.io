<!DOCTYPE html>

<html lang="en-us">
<head>
<base href="https://cdn.jsdelivr.net/gh/67-Factory/web-ports@main/badpiggies/"/>
<meta charset="utf-8"/>
<meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
<title>Unity WebGL Player | Bad Piggies</title>
<link href="https://cdn.jsdelivr.net/gh/ubggames-web/ubggames-web.github.io@main//Bad-Piggies/TemplateData/favicon.ico" rel="shortcut icon"/>
<link href="https://cdn.jsdelivr.net/gh/ubggames-web/ubggames-web.github.io@main//Bad-Piggies/TemplateData/style.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/gh/ubggames-web/ubggames-web.github.io@main//Bad-Piggies/TemplateData/UnityProgress.js"></script>
<script src="https://cdn.jsdelivr.net/gh/ubggames-web/ubggames-web.github.io@main//Bad-Piggies/Build/UnityLoader.js"></script>
<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
		}

		.webgl-content {
			width: 100%;
			height: 100%;
		}

		#gameContainer {
			width: 100vw;
			height: 100vh;
		}
	</style>
<script>
		var gameInstance = UnityLoader.instantiate("gameContainer", "Build/Bad Piggies.json", {
			onProgress: UnityProgress
		});
	</script>
</head>
<body style="background-color:black;">
<div class="webgl-content">
<div id="gameContainer"></div>
</div>
</body>
</html>
