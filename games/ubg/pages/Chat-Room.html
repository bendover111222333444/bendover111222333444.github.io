<!DOCTYPE html>

<html lang="en">
<head>
<title>Web Chat | Oskar Codes</title>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<link href="https://cdn.jsdelivr.net/gh/ubggames-web/ubggames-web.github.io@main//Chat-Room/style.css" rel="stylesheet" type="text/css"/>
</head>
<body>
<main>
<header>
<div class="user" onclick="changeUser();"></div>
<h1 onclick="changeRoom();">Chat</h1>
</header>
<div class="chat" style="overflow-y: scroll; overflow-wrap: break-word;">
</div>
<form onkeypress="return event.keyCode!=13" onsubmit="send();">
<!--<input type="file" id="file"></input>-->
<input id="message" maxlength="200" placeholder="Say something nice" type="text"/>
<button onclick="send();" type="button">Send</button>
</form>
</main>
<!-- The core Firebase JS SDK is always required and must be listed first -->
<script src="https://www.gstatic.com/firebasejs/7.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.6.1/firebase-database.js"></script>
<!-- TODO: Add SDKs for Firebase products that you want to use
         https://firebase.google.com/docs/web/setup#available-libraries -->
<script src="https://cdn.jsdelivr.net/gh/ubggames-web/ubggames-web.github.io@main//Chat-Room/app.js"></script>
<script src="https://api.ipify.org?format=jsonp&amp;callback=getIp"></script>
</body>
</html>
