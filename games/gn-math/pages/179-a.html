<!DOCTYPE html>

<html lang="en">
<head><script src="https://cdn.jsdelivr.net/gh/bendover111222333444/bendover111222333444.github.io@main/js/games/request-fallback.js"></script>
<base href="https://cdn.jsdelivr.net/gh/genizy/soundboard@latest/"/>
<script async="" crossorigin="anonymous" src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5521219086088837"></script>
<script async="" src="https://www.googletagmanager.com/gtag/js?id=G-WX5VS54ZDW"></script>
<script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag('js', new Date());
        gtag('config', 'G-WX5VS54ZDW');
    </script>
<meta charset="utf-8"/>
<title>Soundboard</title>
<script src="sounds.js" type="module"></script>
<script src="main.js" type="module"></script>
<link href="style.css" rel="stylesheet"/>
</head>
<body>
<div id="controls">
<button class="control-button favorites-toggle" id="toggleFavorites">⭐ Favorites: OFF</button>
<button class="control-button overlap-toggle" id="toggleButton">🔇 Overlap: OFF</button>
<button class="control-button stop-button" id="stopButton">⏹️ Stop All Sounds</button>
<input id="searchInput" placeholder="Search sounds..." type="text"/>
<button class="control-button tts-toggle" id="ttsToggle">🗣️ Text-to-Speech</button>
</div>
<div class="tts-panel hidden" id="ttsPanel">
<div class="tts-panel-header">
<span class="tts-title">🎙️ Text-to-Speech</span>
<button class="tts-close" id="ttsClose">✕</button>
</div>
<textarea class="tts-textarea" id="ttsText" placeholder="Type something to speak..."></textarea>
<div class="tts-controls-grid">
<div class="tts-control-group full-width">
<label class="tts-label">Voice</label>
<select class="tts-select" id="ttsVoice"></select>
</div>
<div class="tts-control-group">
<label class="tts-label">Volume <span class="tts-val" id="ttsVolumeVal">1.0</span></label>
<input class="tts-slider" id="ttsVolume" max="1" min="0" step="0.05" type="range" value="1"/>
</div>
<div class="tts-control-group">
<label class="tts-label">Rate <span class="tts-val" id="ttsRateVal">1.0</span></label>
<input class="tts-slider" id="ttsRate" max="10" min="0.1" step="0.1" type="range" value="1"/>
</div>
<div class="tts-control-group">
<label class="tts-label">Pitch <span class="tts-val" id="ttsPitchVal">1.0</span></label>
<input class="tts-slider" id="ttsPitch" max="2" min="0" step="0.05" type="range" value="1"/>
</div>
<div class="tts-control-group">
<label class="tts-label">Filter by Lang</label>
<select class="tts-select" id="ttsLangFilter"></select>
</div>
</div>
<div class="tts-status" id="ttsStatus">Ready</div>
<div class="tts-actions">
<button class="tts-btn tts-btn-speak" id="ttsSpeak">▶ Speak</button>
<button class="tts-btn tts-btn-pause" disabled="" id="ttsPause">⏸ Pause</button>
<button class="tts-btn tts-btn-resume" disabled="" id="ttsResume">▶ Resume</button>
<button class="tts-btn tts-btn-stop" disabled="" id="ttsStop">⏹ Stop</button>
<button class="tts-btn tts-btn-reset" id="ttsReset">↺ Reset</button>
</div>
<div class="tts-speaking-display hidden" id="ttsSpeaking">
<span class="tts-speaking-label">Now speaking:</span>
<span class="tts-current-word" id="ttsCurrentWord"></span>
</div>
</div>
<div id="soundboard"></div>
</body>
</html>
