<!DOCTYPE html>

<html lang="en-us">
<head><script src="https://cdn.jsdelivr.net/gh/bendover111222333444/bendover111222333444.github.io@main/js/games/request-fallback.js"></script>
<meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
<meta content="width=device-width,user-scalable=no" name="viewport"/>
<base href="https://cdn.jsdelivr.net/gh/SomeRandomFella/portsandrips@master/blockblast-port/play/"/>
<meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control"/>
<meta content="no-cache" http-equiv="Pragma"/>
<meta content="0" http-equiv="Expires"/>
<title>beatblock</title>
<link href="style.css" rel="stylesheet"/>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="pending" id="spinner"></div>
<script>
      (async () => {
        const parts = [
          "game.love.part000",
          "game.love.part001",
          "game.love.part002",
          "game.love.part003",
          "game.love.part004",
        ];
        const buffers = await Promise.all(
          parts.map((p) => fetch(p).then((r) => r.arrayBuffer())),
        );
        const merged = new Blob(buffers, { type: "application/octet-stream" });
        const url = URL.createObjectURL(merged);
        const s = document.createElement("script");
        s.src = "player.js?g=" + encodeURIComponent(url) + "&n=1";
        document.body.appendChild(s);
      })();
    </script>
</body>
</html>
