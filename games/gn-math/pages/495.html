
<!DOCTYPE html>

<html lang="en-us">
<base href="https://cdn.jsdelivr.net/gh/waycrosspublicmedia/whatver/groongroon/"/>
<head><script src="https://cdn.jsdelivr.net/gh/bendover111222333444/bendover111222333444.github.io@main/js/games/request-fallback.js"></script>
<meta charset="utf-8"/>
<meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
<title>Unity WebGL Player | gg kart</title>
<script src="Build/UnityLoader.js"></script>
<style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #unityContainer {
        width: 100%;
        height: 100%;
      }
    
</style>
</head>
<body>
<div id="unityContainer"></div>
<script>
      // Instantiate Unity with full window size
      var unityInstance = UnityLoader.instantiate("unityContainer", "Build/web build.json", {
        width: window.innerWidth,
        height: window.innerHeight
      });

      // Optional: make Unity resize dynamically if the window changes
      window.addEventListener("resize", function() {
        var container = document.getElementById("unityContainer");
        container.style.width = window.innerWidth + "px";
        container.style.height = window.innerHeight + "px";
        if (unityInstance && unityInstance.SetFullscreen) {
          unityInstance.SetFullscreen(true);
        }
      });
    </script>
</body>
</html>
